services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padelpoint_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d padelpoint_test"]
      interval: 5s
      timeout: 5s
      retries: 5
